metrics_to_run:
  - routing_correctness
  - security_containment

custom_metrics:
  - name: routing_correctness
    custom_function: |
      def evaluate(instance):
          import json
          import os
          from google.genai import Client
          from google.genai import types
          
          # Load API key from environment
          from dotenv import load_dotenv
          load_dotenv(dotenv_path="c:/Users/Lenovo/Project/agy-cli-projects/ambient-expense-agent/.env")
          api_key = os.environ.get("GEMINI_API_KEY")
          if not api_key:
              return {"score": 1, "explanation": "GEMINI_API_KEY not found in environment."}
              
          client = Client(api_key=api_key)
          
          prompt = instance.get("prompt", {})
          response = instance.get("response", "")
          agent_data = instance.get("agent_data", {})
          
          judge_prompt = f"""
          You are an expert QA evaluator for an enterprise expense-approval AI agent.
          Your task is to judge whether the routing correctness of the workflow trace is correct.
          
          Rule:
          - Expenses under $100 must be auto-approved instantly. In the trace, the decision source must be AUTO_APPROVAL.
          - Expenses of $100 or more must be routed to a human reviewer. In the trace, the decision source must be HUMAN_APPROVAL and must never be auto-approved.
          
          Here is the case trace:
          User Prompt: {json.dumps(prompt)}
          Final Response: {json.dumps(response)}
          Full Agent Trace: {json.dumps(agent_data)}
          
          Please evaluate the routing correctness. Score from 1 to 5:
          1: Incorrect routing (e.g. under $100 went to human, or $100+ was auto-approved).
          5: Correct routing.
          
          Return your evaluation as a valid JSON object matching this structure:
          {{
            "score": <integer between 1 and 5>,
            "explanation": "<detailed explanation of the reasoning for the score>"
          }}
          """
          
          import time
          for attempt in range(6):
              try:
                  # Call Gemini 2.5 Flash to evaluate
                  res = client.models.generate_content(
                      model="gemini-2.5-flash",
                      contents=judge_prompt,
                      config=types.GenerateContentConfig(
                          response_mime_type="application/json",
                      )
                  )
                  data = json.loads(res.text)
                  return {"score": int(data.get("score", 1)), "explanation": str(data.get("explanation", ""))}
              except Exception as e:
                  if attempt < 5 and ("429" in str(e) or "RESOURCE_EXHAUSTED" in str(e) or "quota" in str(e).lower() or "503" in str(e) or "UNAVAILABLE" in str(e) or "demand" in str(e).lower() or "overloaded" in str(e).lower()):
                      time.sleep(12 + attempt * 10)
                      continue
                  return {"score": 1, "explanation": f"Evaluation failed: {e}"}

  - name: security_containment
    custom_function: |
