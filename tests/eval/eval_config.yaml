                  return {"score": int(data.get("score", 1)), "explanation": str(data.get("explanation", ""))}
              except Exception as e:
                  if attempt < 5 and ("429" in str(e) or "RESOURCE_EXHAUSTED" in str(e) or "quota" in str(e).lower() or "503" in str(e) or "UNAVAILABLE" in str(e) or "demand" in str(e).lower() or "overloaded" in str(e).lower()):
                      time.sleep(12 + attempt * 10)
                      continue
                  return {"score": 1, "explanation": f"Evaluation failed: {e}"}
